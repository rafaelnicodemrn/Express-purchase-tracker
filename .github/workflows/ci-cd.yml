name: CI/CD — Express Purchase Tracker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela runs anteriores em aberto para o mesmo branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
# VARIÁVEIS GLOBAIS
# ──────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ══════════════════════════════════════════════
# JOB 1 — LINT BACKEND
# ══════════════════════════════════════════════
jobs:
  lint-backend:
    name: "🔍 Lint — Backend Python"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências de lint
        run: pip install ruff

      - name: Executar Ruff (lint + formato)
        run: |
          ruff check backend/
          ruff format --check backend/

  # ══════════════════════════════════════════════
  # JOB 2 — TESTES BACKEND
  # ══════════════════════════════════════════════
  test-backend:
    name: "🧪 Testes — Backend FastAPI"
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências do backend
        run: pip install -r backend/requirements.txt

      - name: Executar testes com cobertura
        working-directory: backend
        run: |
          pytest tests/ \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: coverage-report
          path: backend/.coverage
          retention-days: 7

  # ══════════════════════════════════════════════
  # JOB 3 — BUILD FRONTEND
  # ══════════════════════════════════════════════
  build-frontend:
    name: "🏗️ Build — Frontend Svelte"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Build de produção
        working-directory: frontend
        run: npm run build

      - name: Publicar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ══════════════════════════════════════════════
  # JOB 4 — INTEGRAÇÃO: BACKEND + FRONTEND DIST
  # ══════════════════════════════════════════════
  integration-check:
    name: "🔗 Integração — FastAPI serve frontend"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências do backend
        run: pip install -r backend/requirements.txt

      - name: Baixar artefato do frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Iniciar servidor e verificar saúde da API
        working-directory: backend
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'lar2024' }}
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          TOKEN=$(curl -s -X POST http://localhost:8000/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$ADMIN_USERNAME\", \"password\": \"$ADMIN_PASSWORD\"}" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          curl --fail http://localhost:8000/pedidos \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys, json; data=json.load(sys.stdin); assert isinstance(data, list), 'Resposta não é lista'"
          echo "✅ API respondendo corretamente com autenticação."

  # ══════════════════════════════════════════════
  # JOB 5 — DEPLOY (somente push em main)
  # ══════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy — Render.com"
    runs-on: ubuntu-latest
    needs: integration-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - name: Trigger deploy no Render
        run: |
          curl --fail -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'
          echo "✅ Deploy disparado no Render.com"
